<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>직장 내 괴롭힘 점검기</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --card: #fffdfa;
      --ink: #1f2937;
      --muted: #6b7280;
      --brand: #0f766e;
      --line: #e5e7eb;
      --warn: #b45309;
      --danger: #b91c1c;
      --good: #065f46;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 5% 5%, #fde68a55, transparent 30%),
        radial-gradient(circle at 95% 10%, #bfdbfe55, transparent 25%),
        var(--bg);
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 20px 14px 40px; }
    .hero {
      background: linear-gradient(135deg, #0f766e, #115e59);
      color: #fff;
      border-radius: 14px;
      padding: 18px;
    }
    .hero h1 { margin: 0 0 6px; font-size: clamp(1.2rem, 2.4vw, 1.65rem); }
    .hero p { margin: 0; font-size: .93rem; opacity: .96; }
    .panel {
      margin-top: 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,.05);
    }
    .meta { display:grid; gap:8px; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
    label { font-size: .9rem; font-weight: 700; }
    input[type=text], input[type=date], textarea {
      width: 100%;
      margin-top: 6px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: .9rem;
      background: #fff;
    }
    textarea { min-height: 80px; resize: vertical; }
    .sec { margin-top: 18px; border-top: 1px dashed #cbd5e1; padding-top: 12px; }
    .sec h2 { margin: 0 0 10px; font-size: 1.02rem; color: #0f766e; }
    .hint { margin: 0 0 8px; color: var(--muted); font-size: .86rem; }
    .q { border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; margin-bottom: 8px; }
    .q p { margin: 0 0 6px; font-size: .92rem; }
    .scale { display:grid; gap:6px; grid-template-columns: repeat(3, minmax(0,1fr)); }
    .scale label {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 6px 8px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: .84rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
    }
    .scale input { margin-right: 4px; }
    .checks { display:grid; gap:8px; grid-template-columns: repeat(2, minmax(0,1fr)); }
    .checks label {
      border:1px solid #e2e8f0;
      border-radius:10px;
      padding:8px 10px;
      font-size:.9rem;
      display:flex;
      gap:7px;
      align-items:flex-start;
      background:#fff;
    }
    .checks input { margin-top: 2px; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top: 14px; }
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 13px;
      font-weight: 700;
      cursor: pointer;
      font-size: .9rem;
    }
    .primary { background:#0f766e; color:#fff; }
    .secondary { background:#e5e7eb; }
    .print { background:#fef3c7; color:#92400e; }
    .result { display:none; margin-top:16px; border-top:2px solid #cbd5e1; padding-top:12px; }
    .score { border-left:5px solid var(--brand); background:#d1fae5; border-radius:8px; padding:10px; }
    .level { font-weight: 800; }
    .level.low { color: var(--good); }
    .level.mid { color: var(--warn); }
    .level.high { color: var(--danger); }

    @media (max-width: 900px) {
      .wrap { padding: 16px 12px 30px; }
      .panel { padding: 12px; }
      .meta { grid-template-columns: 1fr; }
      .checks { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      .actions button { width: 100%; min-height: 42px; }
    }
    @media (max-width: 520px) {
      .scale { grid-template-columns: 1fr; }
      .scale label { min-height: 38px; }
      input[type=text], input[type=date] { min-height: 40px; }
    }
    @media print {
      body { background: #fff; }
      .actions { display:none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>직장 내 괴롭힘 점검기</h1>
      <p>강의 자료(행위별 판단) 기준으로 만든 통합 점검 도구입니다. 판단요건 + 행위유형 + 증거준비 상태를 함께 확인합니다.</p>
    </section>

    <section class="panel">
      <div class="meta">
        <div><label for="team">소속(선택)</label><input id="team" type="text" placeholder="예: 경영지원팀" /></div>
        <div><label for="name">이름(선택)</label><input id="name" type="text" placeholder="익명 가능" /></div>
        <div><label for="date">점검일</label><input id="date" type="date" /></div>
      </div>

      <section class="sec">
        <h2>1) 법적 판단 요건 점검</h2>
        <p class="hint">각 문항을 선택해 주세요: 0점(아니다) / 1점(애매) / 2점(그렇다)</p>
        <div id="coreQuestions"></div>
      </section>

      <section class="sec">
        <h2>2) 행위 유형 점검 (복수 선택)</h2>
        <p class="hint">해당되는 행위를 모두 체크하세요.</p>
        <div class="checks" id="typeChecks"></div>
      </section>

      <section class="sec">
        <h2>3) 증거/지원 준비</h2>
        <div id="evidenceQuestions"></div>
        <label for="memo">메모(선택)</label>
        <textarea id="memo" placeholder="일시, 장소, 발언, 목격자 등 메모"></textarea>
      </section>

      <div class="actions">
        <button class="primary" id="calcBtn">결과 보기</button>
        <button class="secondary" id="resetBtn">초기화</button>
        <button class="print" id="printBtn">인쇄/저장</button>
      </div>

      <section class="result" id="result">
        <div class="score" id="summary"></div>
        <h3>권고 조치</h3>
        <ul id="tips"></ul>
      </section>
    </section>
  </div>

  <script>
    const coreQs = [
      "행위자가 직급·평가권·인사권·집단 영향력 등에서 우위에 있었다.",
      "행위가 업무상 필요 범위를 벗어나거나 방법이 부당했다.",
      "행위가 반복·지속되거나 특정 시기에 집중되었다.",
      "정신적/신체적 고통 또는 근무환경 악화가 발생했다."
    ];

    const typeItems = [
      "업무능력·성과 폄하/조롱",
      "교육·승진·보상·일상대우 차별",
      "과도하거나 곤란한 업무의 반복 부여",
      "업무 미부여/허드렛일 강요",
      "중요 정보·의사결정 과정 배제",
      "휴가·복지 사용 방해",
      "과도한 감시(CCTV·동선·업무감시)",
      "사적 용무 지시",
      "부서이동·퇴사 강요/부당 인사조치",
      "험담·소문 유포",
      "신체적 위협·폭행",
      "폭언·모욕·협박",
      "공개 망신/모멸감 유발",
      "음주·흡연·회식 참여 강요",
      "집단 따돌림",
      "업무 비품/네트워크 제공 제한"
    ];

    const evidenceQs = [
      "메신저/메일/녹취/문서 등 객관자료가 있다.",
      "일시·장소·발언·목격자 중심 사건기록이 있다.",
      "회사 내 신고·상담 창구를 알고 있다.",
      "긴급시 도움 요청할 사람/기관을 정해두었다."
    ];

    const coreWrap = document.getElementById('coreQuestions');
    const typeWrap = document.getElementById('typeChecks');
    const evWrap = document.getElementById('evidenceQuestions');
    const resultEl = document.getElementById('result');
    const summaryEl = document.getElementById('summary');
    const tipsEl = document.getElementById('tips');

    document.getElementById('date').valueAsDate = new Date();

    function renderScoredQuestions(items, namePrefix, target, max) {
      items.forEach((q, idx) => {
        const box = document.createElement('div');
        box.className = 'q';
        let radios = '';
        for (let v = 0; v <= max; v++) {
          const label = max === 2 ? (v === 0 ? '아니다' : v === 1 ? '애매' : '그렇다') : `${v}점`;
          radios += `<label><input type="radio" name="${namePrefix}${idx}" value="${v}">${label}</label>`;
        }
        box.innerHTML = `<p>${idx + 1}. ${q}</p><div class="scale">${radios}</div>`;
        target.appendChild(box);
      });
    }

    function renderChecks(items, target) {
      items.forEach((t, i) => {
        const lb = document.createElement('label');
        lb.innerHTML = `<input type="checkbox" name="type" value="${i}"><span>${i + 1}. ${t}</span>`;
        target.appendChild(lb);
      });
    }

    renderScoredQuestions(coreQs, 'core', coreWrap, 2);
    renderChecks(typeItems, typeWrap);
    renderScoredQuestions(evidenceQs, 'ev', evWrap, 2);

    function sumScores(prefix, len) {
      let s = 0;
      for (let i = 0; i < len; i++) {
        const pick = document.querySelector(`input[name="${prefix}${i}"]:checked`);
        if (!pick) return null;
        s += Number(pick.value);
      }
      return s;
    }

    function classify(coreScore, typeCount) {
      if (coreScore >= 6 && typeCount >= 2) return ['높음', 'high'];
      if (coreScore >= 4 && typeCount >= 1) return ['중간', 'mid'];
      return ['낮음', 'low'];
    }

    function buildTips(level, typeCount, evScore, violentChecked) {
      const tips = [];
      if (violentChecked) {
        tips.push('신체적 위협/폭행이 의심됩니다. 안전확보를 최우선으로 하고 즉시 공식 신고와 보호조치를 요청하세요.');
      }
      if (level === '높음') {
        tips.push('괴롭힘 해당 가능성이 높습니다. 사건기록 정리 후 회사 고충창구/인사부서에 공식 접수를 권고합니다.');
        tips.push('보복 우려가 있으면 분리, 근무조정, 접촉 제한 등 임시 보호조치를 함께 요청하세요.');
      } else if (level === '중간') {
        tips.push('괴롭힘 의심 상황입니다. 반복성·정당성·피해영향을 중심으로 사실관계를 추가 확인하세요.');
      } else {
        tips.push('현 시점에서는 법적 요건 충족도가 낮게 나타났습니다. 다만 유사행위가 반복되면 즉시 재점검하세요.');
      }

      if (typeCount >= 4) tips.push('행위 유형이 복합적으로 나타납니다. 단일 사건보다 패턴 단위로 기록하는 것이 중요합니다.');
      if (evScore <= 3) tips.push('증거·지원 준비가 부족합니다. 메신저/메일 보관, 사건일지 작성, 신고창구 확인을 먼저 진행하세요.');
      if (tips.length < 3) tips.push('필요 시 노무·법률·심리상담 등 외부 전문기관 연계를 검토하세요.');
      return tips;
    }

    document.getElementById('calcBtn').addEventListener('click', () => {
      const coreScore = sumScores('core', coreQs.length);
      const evScore = sumScores('ev', evidenceQs.length);
      if (coreScore === null || evScore === null) {
        alert('법적 판단 요건과 증거/지원 준비 문항을 모두 선택해 주세요.');
        return;
      }

      const checked = [...document.querySelectorAll('input[name="type"]:checked')].map(x => Number(x.value));
      const typeCount = checked.length;
      const violentChecked = checked.includes(10);
      const [levelText, levelClass] = classify(coreScore, typeCount);

      summaryEl.innerHTML = `
        <div><strong>핵심요건 점수:</strong> ${coreScore} / 8</div>
        <div><strong>행위유형 체크:</strong> ${typeCount}개 / 16개</div>
        <div><strong>증거·지원 준비 점수:</strong> ${evScore} / 8</div>
        <div class="level ${levelClass}">종합 위험도: ${levelText}</div>
      `;

      const tips = buildTips(levelText, typeCount, evScore, violentChecked);
      tipsEl.innerHTML = tips.map(t => `<li>${t}</li>`).join('');
      resultEl.style.display = 'block';
      resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(el => el.checked = false);
      document.getElementById('memo').value = '';
      resultEl.style.display = 'none';
    });

    document.getElementById('printBtn').addEventListener('click', () => window.print());
  </script>
</body>
</html>
